interface:
  display_name: "Xbatis AI Skill"
  short_description: "面向 Agent 的专业 xbatis 编码与审查规则"
  default_prompt: "Use $xbatis-ai-skill to implement or review xbatis-based Java persistence code by preferring native xbatis patterns, defaulting new work to single-mapper DAO style when appropriate, bootstrapping Spring Boot 2/3/4 or Solon integration from the environment setup guidance before generating persistence code, enabling xbatis POJO safety checks in the development environment only by default, creating project BaseDao before business DAOs, injecting the Mapper in project BaseDao#setMapper(...) with Spring, Solon, or similar container auto-injection annotations while keeping BaseDao subclasses from overriding setMapper(...), avoiding simple business DAO methods that only duplicate BaseDao or built-in Mapper methods, requiring persistent enums to implement cn.xbatis.core.mybatis.typeHandler.EnumSupport<T>, confirming unknown package names, class names, methods, annotations, and generic signatures from local xbatis source before generating code, using getById/getValueById for id lookups, building QO conditions with @ConditionTarget-style annotations and WhereUtil.where(this), preferring Lombok @FieldNameConstants and Fields references in xbatis annotations, using getter or field references for .as(...) aliases, creating SQL templates through Methods.tpl/Methods.fTpl/Methods.cTpl, setting create/update audit fields with xbatis TableField defaults, using Model directly for save/update when appropriate, preferring partialUpdate(...) for single-row read-then-modify partial changes, finishing UpdateChain/InsertChain/DeleteChain with execute(), ignoring non-database-operation fields in VO/QO/Model via @Ignore or @Ignores, keeping entity classes limited to database table fields only, returning VO via xbatis result-mapping annotations instead of entities, and only falling back to XML or raw SQL when needed."

policy:
  allow_implicit_invocation: true
